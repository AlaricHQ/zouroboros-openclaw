name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - packages/swarm-gate
          - packages/autoloop
          - packages/memory
          - packages/bench

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.package }}

      - name: Typecheck
        run: npm run typecheck --if-present
        working-directory: ${{ matrix.package }}

      - name: Test
        run: npm test --if-present
        working-directory: ${{ matrix.package }}

