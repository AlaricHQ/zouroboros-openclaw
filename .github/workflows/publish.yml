name: Publish Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: "Package to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - swarm-gate
          - autoloop
          - memory
          - bench
  release:
    types:
      - published

jobs:
  noop:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Skip publish on push
        run: echo "Publish workflow is configured for release and manual dispatch. Push events do not publish packages."

  publish:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == matrix.name))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: swarm-gate
            path: packages/swarm-gate
          - name: autoloop
            path: packages/autoloop
          - name: memory
            path: packages/memory
          - name: bench
            path: packages/bench

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.path }}

      - name: Publish
        run: npm publish --access public
        working-directory: ${{ matrix.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
