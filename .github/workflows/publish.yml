name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Package to publish"
        required: true
        default: all
        type: choice
        options:
          - all
          - swarm-gate
          - autoloop
          - memory
          - bench
  release:
    types:
      - published

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: swarm-gate
            path: packages/swarm-gate
          - name: autoloop
            path: packages/autoloop
          - name: memory
            path: packages/memory
          - name: bench
            path: packages/bench

    if: github.event_name == 'release' || github.event.inputs.target == 'all' || github.event.inputs.target == matrix.name

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: ${{ matrix.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.path }}

      - name: Build
        run: npm run build
        working-directory: ${{ matrix.path }}

      - name: Publish
        run: npm publish --access public
        working-directory: ${{ matrix.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

